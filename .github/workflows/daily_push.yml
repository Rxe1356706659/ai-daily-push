name: intelligence-push
on:
  workflow_dispatch:
  jobs:
    push:
        runs-on: ubuntu-latest
            steps:
                  - uses: actions/checkout@v4
                        - uses: actions/setup-python@v5
                                with:
                                          python-version: '3.11'
                                                - name: run
                                                        env:
                                                                  SERVERCHAN_KEY: ${{ secrets.SERVERCHAN_KEY }}
                                                                            GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
                                                                                    run: python push_daily.py
                                                                                    
